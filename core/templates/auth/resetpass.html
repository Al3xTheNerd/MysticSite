{% extends "core_layout.html" %}
{% block content %}
    <div class="row gx-3 gy-3">
        <div class="col-xs-12 col-sm-12 col-md-6 col-lg-4 col-xl-4 col-xxl-3">
            <div class="give-preview-text-outer">
                <div class="give-preview-text w-100">
                    <div class="give-preview-text-inner">
                        <form method="POST" action="/resetpass">
                            <div class="form-floating mb-3">
                                <input type="password" class="form-control" name='password' id="passwordGroup"
                                    placeholder="Password">
                                <label for="passwordGroup">Password</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="password" class="form-control" name='confirmpassword' id="confirmpasswordGroup"
                                    placeholder="Password">
                                <label for="confirmpasswordGroup">Confirm Password</label>
                            </div>
                            <button class="btn btn-primary mb-1" type="submit">Signup</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
