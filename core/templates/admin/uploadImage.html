{% extends "core_layout.html" %}
{% block content %}

<div class="row gx-3 gy-3 mb-3 mt-3">
    <div class="col-12">
        <div class="card text-white bg-dark">
            <div class="card-body">
                <h4 class="card-title">Image Uploader</h4>
            </div>
            <ul class="list-group list-group-flush">
                <li class="list-group-item mc-gold bg-dark">Use this page to upload an icon for an item.</li>
            </ul>
        </div>
    </div>
</div>
<div class="row gx-3 gy-3 mb-3">

    <div class="col-xs-12 col-sm-12 col-md-6 col-lg-8 col-xl-8 col-xxl-9">
        <div class="card h-100 bg-dark border-white">
            <h3 class="card-header border-white text-white">{{ item.ItemName | safe }}</h3>
            <div class="card-body weird-margins" id="colorsContainer">
                <form method="post" id="exportForm" enctype=multipart/form-data>
                    <div class="mb-3">
                    <label for="DescriptionGroup">.png File</label>
                        <input type="file" class="form-control" name='file' id="DescriptionGroup"
                            placeholder="Select .png file">
                        
                    </div>
                
                </form>
            </div>
        </div>
    </div>
    <div class="col-12">
        <div class="row text-center">
            <div class="col-xs-3 col-sm-6 col-md-3 mt-3">
                <button type="submit" form="exportForm" class="btn btn-danger">
                    Upload Data
                </button>
            </div>
            <div class="col-xs-3 col-sm-6 col-md-3 mt-3">
                <button class="btn btn-danger" onclick="checkAll()">
                    Check All
                </button>
            </div>
            <div class="col-xs-3 col-sm-6 col-md-3 mt-3">
                <button class="btn btn-danger" onclick="uncheckAll()">
                    Uncheck All
                </button>
            </div>
        </div>
    </div>

</div>



{% endblock %}
