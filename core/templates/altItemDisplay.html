{% set iconRouteBase = "images/" ~ ServerName ~ "_Icons/" %}
<style>
    .tooltip {
        --bs-tooltip-max-width: 500px;
    }
</style>
<div class="row gx-3 gy-3 mb-3">
    <div class="col-12">
        <div class="card text-white bg-dark">
            <div class="card-body">
                <h4 class="card-title">{{Group.GroupName}}</h4>
            </div>
            <ul class="list-group list-group-flush">
            <li class="list-group-item mc-gold bg-dark">Release Date: <code>{{ Group.ReleaseDate }}</code></li>
            {% if Group.Notes %}
            <li class="list-group-item mc-gold bg-dark">{{Group.Notes}}</li>
            {% endif %}
            </ul>
        </div>
    </div>
</div>
<div class="row gx-3 gy-3">
    <!--<div class="row" data-masonry='{"percentPosition": true }'>-->
    {% for item in Items %}

    <div class="col-xs-6 col-sm-6 col-md-3 col-lg-3 col-xl-2 col-xxl-2 hard-wrap">
        <div class="card text-white bg-dark">
            <div class="card-body">
                <p class="card-text">{{item.Notes}}</h4>
                {{ item.icon_based_image() | safe }}
            </div>
        </div>
    </div>
    {% endfor %}
</div>
